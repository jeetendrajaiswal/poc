  - Interest expense on borrowings
  - Interest on term loans
  - Interest and finance charges on borrowings
  - Interest expense on financial liabilities
  - Interest expenses on financial liabilities not at fvtpl
  - Interest expended
  column_hint: interest on borrowings within Finance Costs (not total finance costs)
