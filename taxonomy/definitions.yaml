  aliases:
  - Equity attributable to owners of the Company
  - attributable to owners of the parent
  - Equity attributable to equity holders of the parent
  - attributable to owners of the Holding Company
  location_hint: Consolidated Balance Sheet / SOCE (Equity section); Share Capital note
- key: Share Depreciation Joint ventures
  scope: consolidated
  value_type: monetary
  concept: Group's share of depreciation/amortisation of joint ventures (equity-accounted). Consolidated
