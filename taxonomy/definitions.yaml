  - Allowance for doubtful debts (charge)
  - Provision for bad or doubtful loans
  - Allowances for Credit Loss
  - Allowance for credit losses
  - Allowance for credit loss / doubtful advances
  - Provision for doubtful debts, loans and other financial assets
  location_hint: Other Expenses note (P&L); Impairment Loss on Financial Assets note
- key: Bad Debts Advances Written Off
  scope: both
  value_type: monetary
  concept: Bad debts and advances written off during the year (P&L).
  aliases:
  - Bad debts written off
  - Bad debts and advances written off
  - Advances written off
  - Bad debts / advances written off
  location_hint: Other Expenses note (P&L)
- key: Interest Expense Borrowings
  scope: both
  value_type: monetary
  concept: Interest expense on borrowings (a component of Finance Costs). Ind AS 23.
  aliases:
