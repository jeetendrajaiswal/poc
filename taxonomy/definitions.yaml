  aliases:
  - Changes in inventories of finished goods, work-in-progress and stock-in-trade
  - Changes in inventories
  - (Increase)/decrease in inventories
  - Changes in stock
  column_hint: the single P&L line (parentheses = negative)
  location_hint: Statement of Profit and Loss (expenses section)
- key: Deferred Tax Assets (Net)_Deferred tax liabilities_Accumulated Depreciation
  scope: both
  value_type: monetary
  concept: Deferred tax LIABILITY component arising from accumulated depreciation / difference in WDV
