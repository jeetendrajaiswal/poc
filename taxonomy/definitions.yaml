  aliases:
  - Impairment loss on financial assets
  - Expected credit loss
  - Impairment of loans and advances
  - Allowance for expected credit loss (charge)
  location_hint: Other Expenses / Finance-related note (P&L)
- key: Provision Bad Doubtful Loans Advances
  scope: both
