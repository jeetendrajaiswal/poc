  - Property, plant and equipment
  - Depreciation
  - Difference in WDV / depreciation
  - Accelerated depreciation (DTL)
  column_hint: deferred tax LIABILITY component for depreciation/PPE
  location_hint: Deferred Tax note (components breakdown)
- key: Deferred Tax Liability (Net)_Deferred Tax Assets_Leave Encashment
  scope: both
