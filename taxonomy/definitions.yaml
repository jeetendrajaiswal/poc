  aliases:
  - Share of depreciation of joint ventures
  - Group's share of depreciation in JV
  - Share in depreciation of joint ventures
  location_hint: Consolidated notes — interests in joint ventures / associates; Depreciation / PP&E movement
    schedule note
- key: Total Power & Fuel Expenses
  scope: both
  value_type: monetary
  kind: reported
  concept: Cost of power and fuel consumed — single printed line in Other/Manufacturing Expenses.
  aliases:
  - Power and fuel
  - Power & fuel
  - Power, fuel and water
  - Consumption of power and fuel
  location_hint: Other Expenses note (P&L); Manufacturing / operating expenses schedule
- key: Consumption Of Stores And Spare Parts
  scope: both
  value_type: monetary
  concept: Cost of stores and spare parts consumed during the year.
  aliases:
  - Stores and spares consumed
  - Stores & spares consumed
  - Consumption of stores and spares
  - Stores, spares and consumables
  - Consumption of stores and spare parts
  location_hint: Other Expenses / Manufacturing Expenses note
- key: Brokerage/Commission To Agents
  scope: both
  value_type: monetary
  concept: Brokerage and commission paid to selling agents.
  aliases:
  - Commission to agents
  - Brokerage and commission
  - Commission and brokerage
  - Selling commission
  - To agents
  - Commission - to agents
  location_hint: Other Expenses note (P&L)
- key: Carriage Outwards
  scope: both
  value_type: monetary
  concept: Outward freight / carriage on dispatch of goods (distribution).
  aliases:
  - Freight and forwarding
  - Carriage outward
  - Outward freight
  - Freight outward
  - Distribution expenses (freight)
  location_hint: Other Expenses note (P&L); Revenue-from-operations / gross-revenue schedule (freight)
- key: Legal & Professional Charges
  scope: both
  value_type: monetary
  concept: Legal and professional / consultancy fees.
  aliases:
  - Legal and professional
  - Legal & professional charges
  - Legal & professional fees
  - Professional and consultancy charges
  - Legal and professional fees
  location_hint: Other Expenses note (P&L)
- key: Payments To Auditor
  scope: both
  value_type: monetary
  concept: Total remuneration to auditors (audit fee + tax + other services). Companies Act §142.
  aliases:
  - Payment to auditors
  - Auditors' remuneration
  - Remuneration to auditors
  - Payment to statutory auditors
  - Auditor fees and expenses
  - Auditors' fees and expenses
  column_hint: total auditor remuneration
  location_hint: Other Expenses note (auditor remuneration sub-note)
- key: Payment for reimbursement of expenses
  scope: both
