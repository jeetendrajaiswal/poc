sector: Software
client: DummyTest
items:
- fid: '256'
  name: Gross Sales/Income from Operations
  statement: income
  order: 2
  concept: The filing's printed 'Revenue from operations' / 'Income from operations' / 'Net sales' line
    ALWAYS maps here — this is the leaf input field (271 is computed from it by formula and must NEVER
    receive the printed revenue line).
  aliases:
  - Revenue from operations
  evidence: mapped
- fid: '242'
  name: Excise Duty
  statement: income
  order: 3
  concept: Indirect tax or duty on sales that is deducted from gross operating revenue to arrive at net
    sales. Includes excise duty or equivalent sales duty shown separately in older formats. Excludes operating
    revenue itself and any other taxes not presented as a deduction from revenue.
  aliases: []
  evidence: inferred
- fid: '271'
  name: Net Sales/Income from Operations
  statement: income
  order: 4
  concept: Computed net-sales aggregate (gross less duties) — NEVER map the filing's printed 'Revenue
    from operations' line here; that line always maps to 256. Only use if the filing separately prints
    gross revenue and a net-of-duties subtotal (rare).
  aliases: []
  evidence: inferred
- fid: '281'
  name: Other Operating Income
  statement: income
  order: 5
  concept: Income arising from ordinary operating activities other than the main revenue from operations.
    Includes miscellaneous operating receipts, operating incentives, service recoveries, and similar recurring
    operating items that are not separately classified elsewhere. Excludes non-operating income such as
    interest, dividend, forex gains, investment gains, and extraordinary/exceptional items.
  aliases: []
  evidence: inferred
- fid: '302'
  name: Profit on Sale of Investments
  statement: income
  order: 6
  concept: Gain realized on sale of investments, including disposal of mutual funds, securities, or other
    financial investments. Use only for the profit component from investment disposals. Excludes interest,
    dividend income, unrealized fair-value changes, and gains on sale of fixed assets.
  aliases: []
  evidence: inferred
- fid: '258'
  name: Income From Leases
  statement: income
  order: 7
  concept: Income earned from leasing arrangements where the company is the lessor, such as rental or
    lease receipts. Includes lease revenue from operating or finance leases when disclosed as income.
    Excludes rent expense, sublease payments made by the company, and gains on sale of leased assets.
  aliases: []
  evidence: inferred
- fid: '266'
  name: Total Income from Operations (net)
  statement: income
  order: 8
  concept: Total revenue generated from operations, consisting of gross sales/income from operations plus
    other operating income and any lease income treated as operating. This is the printed subtotal for
    operating income. Excludes other income that is non-operating in nature.
  aliases: []
  evidence: inferred
- fid: '235'
  name: Dividend Income
  statement: income
  order: 10
  concept: Income from equity dividends or similar profit distributions received from investments. Includes
    dividend receipts from shares and units when reported as income. Excludes dividend paid by the company,
    interest income, and gains from sale of investments.
  aliases: []
  evidence: inferred
- fid: '260'
  name: Interest Income
  statement: income
  order: 11
  concept: Interest earned on deposits, loans, investments, or other interest-bearing balances. Includes
    coupon interest and interest on bank deposits or tax refunds if shown as interest income. Excludes
    finance costs, dividend income, and gains from investment sale.
  aliases: []
  evidence: inferred
- fid: '241'
  name: Exchange Gain/(Loss)
  statement: income
  order: 12
  concept: Net foreign-exchange gain or loss recognized in income, arising from translation or settlement
    of monetary items and other FX exposures. Use the net figure whether presented as gain or loss; gains
    are positive and losses are negative. Excludes translation differences taken directly to other comprehensive
    income.
  aliases: []
  evidence: inferred
- fid: '306'
  name: Provision Written Back
  statement: income
  order: 13
  concept: Reversal of earlier provisions, reserves, or expected-loss allowances that is credited to income.
    Includes provision written back, reserve reversal, and similar credit items. Excludes fresh provisions,
    impairment charges, and ordinary operating expense accruals.
  aliases: []
  evidence: inferred
- fid: '300'
  name: Prior Year Income/(Expenditure)
  statement: income
  order: 14
  concept: Income or expense relating to prior accounting periods, such as prior-year adjustments, prior-period
    corrections, or back-dated charges/credits. Use the net amount; credits are positive and charges are
    negative. Excludes current-period operating expenses and exceptional items unless explicitly classified
    as prior-year items.
  aliases: []
  evidence: inferred
- fid: '251'
  name: Gain (Loss) on Sale of Assets
  statement: income
  order: 15
  concept: Net gain or loss on disposal of fixed assets or other non-current assets. Gains and losses
    may be reported separately or netted; gains are positive and losses are negative. Excludes sale of
    investments, depreciation, and impairment losses.
  aliases: []
  evidence: inferred
- fid: '254'
  name: Gain (Loss) on Sale of Investments
  statement: income
  order: 16
  concept: Net gain or loss on sale of investments, securities, or similar financial assets. Gains are
    positive and losses are negative. Excludes interest income, dividend income, unrealized fair-value
    movements, and gains on sale of fixed assets.
  aliases: []
  evidence: inferred
- fid: '265'
  name: Miscellaneous Income
  statement: income
  order: 17
  concept: A filing's single printed 'Other income' / 'Other income (net)' line maps HERE. Miscellaneous/other
    non-operating income of the period. NEVER map it to the Total Other Income aggregate (321) — 321 is
    only for a printed SUBTOTAL that aggregates multiple separately-printed other-income components (interest
    income, dividend, forex gain etc.).
  aliases:
  - Other income (net)
  - Other income
  evidence: mapped
- fid: '321'
  name: Total Other Income
  statement: income
  order: 18
  concept: Printed SUBTOTAL aggregating MULTIPLE separately-printed other-income components (interest,
    dividend, forex, profit on investments...). Use ONLY when the filing prints such an aggregate line
    in addition to its components. A single 'Other income' line maps to 265, NOT here.
  aliases:
  - Total Income
  evidence: mapped
- fid: '25238'
  name: Total Income
  statement: income
  order: 19
  concept: Grand total revenue and income for the period, equal to revenue from operations plus total
    other income. This is the printed top-line total income figure. Excludes expenses and profit measures.
  aliases:
  - TOTAL INCOME
  - Total Income
  - Total income
  - Total revenue
  evidence: mapped
- fid: '230'
  name: Cost of Materials Consumed
  statement: income
  order: 21
  concept: Consumption cost of raw materials, components, consumables, or other materials used in producing
    goods or services. Includes material purchases consumed in the period. Excludes purchase of stock-in-trade,
    employee costs, outsourced services, and inventory change adjustments.
  aliases: []
  evidence: inferred
- fid: '307'
  name: Purchase of Stock-in-Trade
  statement: income
  order: 22
  concept: Purchases of goods held for resale, including stock-in-trade bought by trading businesses.
    May also absorb other operating purchase-type charges when presented as a combined line. Excludes
    raw-material consumption and inventory change adjustments.
  aliases:
  - Purchase of stock-in-trade
  - Purchases and other operating expenditure
  - Purchases of stock-in-trade
  evidence: mapped
- fid: '227'
  name: Changes in Inventories of Finished Goods, Work-In-Progress and Stock-In-Trade
  statement: income
  order: 23
  concept: Net change in inventories of finished goods, work-in-progress, and stock-in-trade recognized
    in profit and loss as an expense reduction or expense increase. A negative change in inventory is
    an expense release; a positive change is an expense. Excludes purchases and cost of materials consumed.
  aliases:
  - Changes in inventories of finished goods stock-in-trade and work-in-progress
  - Changes in inventories of stock-in-trade
  evidence: mapped
- fid: '276'
  name: Operating Expenses
  statement: income
  order: 24
  concept: External operating service costs incurred in running the business, such as subcontracting,
    outsourcing, facility services, technical fees, processing charges, and similar third-party operating
    expenses. Often used as a broad catch-all for service-based operating costs. Excludes employee costs,
    depreciation, finance costs, advertising, freight, and administration items classified separately.
  aliases:
  - Facility expenses
  - Outsourcing costs
  - Sub-contracting and technical fees
  evidence: mapped
- fid: '315'
  name: Software Development Expenses
  statement: income
  order: 25
  concept: Technology-related operating expense for software development tools, software licences, development
    platforms, and similar internally used software costs. Includes license fees and other directly attributable
    software-development costs when separately disclosed. Excludes general IT service costs, employee
    costs, and amortization unless explicitly part of the line.
  aliases:
  - Cost of equipment and software licences
  - Software license expense for internal use
  evidence: mapped
- fid: '229'
  name: Construction Material/Expenses
  statement: income
  order: 26
  concept: Direct construction-related material and other project expenses incurred in construction or
    turnkey activity. Includes construction materials, site expenses, and related direct costs. Excludes
    general operating expenses, employee costs, and depreciation.
  aliases: []
  evidence: inferred
- fid: '263'
  name: Licence Fee/Charges
  statement: income
  order: 27
  concept: Fees and charges paid for licenses, permissions, permits, regulatory approvals, or similar
    entitlement costs. Includes licence-related operating charges when separately shown. Excludes software
    licences, royalty expense, and taxes/duties.
  aliases: []
  evidence: inferred
- fid: '238'
  name: Employee Benefit Expense
  statement: income
  order: 28
  concept: All costs relating to employees, including salaries, wages, bonuses, incentives, gratuity,
    provident fund, contribution expenses, and employee welfare. Includes both cash and non-cash employee
    benefits. Excludes contractor fees, outsourcing costs, and director remuneration only if separately
    classified outside employee costs.
  aliases:
  - Employed benefits expense
  - Employee benefit expenses
  - Employee benefits expense
  evidence: mapped
- fid: '232'
  name: Depreciation, Depletion and Amortisation Expense
  statement: income
  order: 29
  concept: Non-cash charge for the periodic consumption of long-term assets, including depreciation, amortization,
    and depletion; may include impairment if disclosed within the same line. Use the gross expense amount
    as presented, with no offsetting income. Excludes finance costs and loss on asset sale.
  aliases:
  - Depreciation amortisation and impairment expense
  - Depreciation and amortisation expense
  - Depreciation and amortization expense
  evidence: mapped
- fid: '314'
  name: Selling Expenses
  statement: income
  order: 30
  concept: Expenses directly associated with selling activities, distribution, and market-facing functions.
    Includes sales commissions, sales promotion, selling overheads, and related selling support costs.
    Excludes advertising if separately classified, freight if separately classified, and general administration
    expenses.
  aliases: []
  evidence: inferred
- fid: '217'
  name: Advertising & Promotions
  statement: income
  order: 31
  concept: Spending on advertising, marketing campaigns, brand building, publicity, and promotions. Includes
    media spend and promotional program costs. Excludes general selling salaries, freight, and pure administration
    costs.
  aliases:
  - Marketing and brand building
  evidence: mapped
- fid: '248'
  name: Freight & Handling Expenses
  statement: income
  order: 32
  concept: Cost of moving goods or materials, including freight, transportation, shipping, handling, clearing,
    and forwarding charges. Includes outbound and inbound freight when presented as a logistics expense.
    Excludes warehousing if classified separately and general administrative travel.
  aliases: []
  evidence: inferred
- fid: '14861'
  name: Administration Expenses
  statement: income
  order: 33
  concept: General administrative overheads not directly attributable to production or selling, such as
    legal fees, professional charges, communication, office expenses, subscriptions, and similar back-office
    costs. Multiple minor admin expense lines may legitimately sum here. Excludes employee costs, depreciation,
    finance costs, and selling-specific or production-specific expenses.
  aliases:
  - Communication
  - Legal and professional charges
  evidence: mapped
- fid: '323'
  name: Travelling Cost
  statement: income
  order: 34
  concept: Travel and related business travel expenditure, including fares, lodging, local conveyance,
    and travel allowances when disclosed as a single line. Excludes employee salaries, customer entertainment,
    and general administration unless classified within travel.
  aliases:
  - Travel
  evidence: mapped
- fid: '240'
  name: Exchange (Gain)/Loss
  statement: income
  order: 35
  concept: Net foreign-exchange gain or loss recognized in expense or other expense lines. Use the net
    amount as reported, with gains positive and losses negative. Excludes translation differences routed
    to other comprehensive income.
  aliases: []
  evidence: inferred
- fid: '305'
  name: Provision/Written Off/for Contingencies
  statement: income
  order: 36
  concept: Provision expense, write-off, or contingency charge relating to doubtful debts, expected credit
    losses, claims, litigation, warranties, or similar uncertain obligations. Includes write-backs only
    when the line is explicitly netted and should be treated as negative. Excludes routine operating expenses
    and depreciation.
  aliases:
  - Lifetime expected credit loss/ (write-back)
  evidence: mapped
- fid: '297'
  name: Power and Fuel
  statement: income
  order: 37
  concept: Power, electricity, fuel, and utility consumption used in operations. Includes energy costs,
    power charges, diesel/fuel used for operations, and similar utility expense. Excludes rent, repairs,
    and manufacturing materials.
  aliases: []
  evidence: inferred
- fid: '299'
  name: Prior Year (Income)/Expenditure
  statement: income
  order: 38
  concept: Income or expenditure relating to prior accounting periods, including prior-year provisions,
    adjustments, and corrections. Use the net amount; credits are positive and charges are negative. Excludes
    current-period normal operating expenses and exceptional items unless separately identified as prior-period
    items.
  aliases: []
  evidence: inferred
- fid: '250'
  name: (Gain) Loss on Sale of Assets
  statement: income
  order: 39
  concept: Net gain or loss on disposal of fixed assets or other non-current assets. Gains are positive
    and losses are negative. Excludes sale of investments and any depreciation or impairment charge on
    assets retained in use.
  aliases: []
  evidence: inferred
- fid: '253'
  name: (Gain) Loss on Sale of Investments
  statement: income
  order: 40
  concept: Net gain or loss recognized on disposal of equity shares, debt securities, mutual funds, or
    other investments held by the company. Includes realized proceeds minus carrying value and any related
    disposal gain/loss line. Excludes gains/losses on sale of fixed assets, revaluation changes, fair
    value changes not arising from sale, and interest/dividend income from investments. Never map a printed
    total/aggregate line here.
  aliases: []
  evidence: inferred
- fid: '246'
  name: Finance Costs
  statement: income
  order: 41
  concept: Financing cost expense incurred for borrowing and other finance arrangements. Includes interest
    on loans and borrowings, debentures, lease finance cost, bank charges, commitment fees, and similar
    borrowing-related costs. Excludes foreign exchange gain/loss on borrowings unless separately embedded
    in a finance-cost note line and excluded from this field by the source presentation, and excludes
    discounting gains/credits. Never map a printed total/subtotal line here.
  aliases:
  - Finance costs
  - Finance costs
  - Finance costs
  - Finance costs
  - Finance costs
  evidence: mapped
- fid: '247'
  name: Foreign Exchange (Gain)/Loss (Finance Cost)
  statement: income
  order: 42
  concept: Foreign exchange gain or loss that is reported within finance costs because it arises from
    borrowings, lease liabilities, or other financing liabilities. Map only the FX component of finance
    cost presentation. Excludes standalone operating exchange differences, translation differences on
    foreign operations, and non-financing FX gains/losses reported elsewhere. Never map a printed total/subtotal
    line here.
  aliases: []
  evidence: inferred
- fid: '279'
  name: Other Expenses
  statement: income
  order: 43
  concept: Residual operating and non-operating expenses not captured by specific expense heads elsewhere
    in the statement. Includes miscellaneous administrative, selling, and other recurring expenses when
    presented as a single ‘other expenses’ line, and may include small sundry charges aggregated by the
    company. Excludes employee benefits, finance costs, depreciation/amortisation, tax, exceptional items,
    and any clearly identified specific expense category. Never map a printed total/subtotal line here.
  aliases:
  - Other expenses
  - Other expenses
  - Other expenses
  - Other expenses
  - Other expenses
  evidence: mapped
- fid: '243'
  name: Expenses Capitalised
  statement: income
  order: 44
  concept: Amount of costs that are capitalized rather than expensed in the period, reducing reported
    expenses. Includes staff, overhead, borrowing, or development costs transferred to qualifying assets
    or work-in-progress when the source statement presents a separate ‘expenses capitalised’ adjustment.
    Excludes actual expense lines themselves and does not include depreciation of already capitalized
    assets. Never map a printed total/subtotal line here.
  aliases: []
  evidence: inferred
- fid: '320'
  name: Total Expenses
  statement: income
  order: 45
  concept: Total of all operating and non-operating expense components shown in the income statement,
    after deducting any expenses capitalised if the statement presents that reduction. Includes the sum
    of employee costs, finance costs, depreciation/amortisation, other expenses, impairment, and any other
    ordinary expense components included in the company’s expense block. Excludes tax expense and exceptional-item
    subtotal unless the filing explicitly classifies them within expenses. The printed total expense line
    maps here.
  aliases:
  - TOTAL EXPENSES
  - Total Expenses
  - Total expenses
  - Total expenses
  - Total expenses
  evidence: mapped
- fid: '293'
  name: Profit/(Loss) from Operations before Other Income, Finance Costs and Exceptional Items
  statement: income
  order: 46
  concept: Operating profit or loss before other income, finance costs, and exceptional items. This is
    the result of revenue from operations minus operating expenses, optionally adjusted for expenses capitalised
    if the source statement presents that adjustment in the operating section. Excludes other income,
    finance costs, exceptional items, and tax. Never map a line that already includes finance cost or
    exceptional items.
  aliases: []
  evidence: inferred
- fid: '295'
  name: Profit/(Loss) from Ordinary Activities before Finance Costs and Exceptional Items
  statement: income
  order: 47
  concept: Profit or loss from ordinary activities before finance costs and exceptional items. Includes
    operating profit plus other income as presented before deducting finance costs. Excludes exceptional
    items and tax. Do not map a line that already includes finance costs or exceptional items; the printed
    subtotal before finance costs maps here.
  aliases: []
  evidence: inferred
- fid: '294'
  name: Profit/(Loss) from Ordinary Activities after Finance Costs but before Exceptional Items
  statement: income
  order: 48
  concept: Profit or loss from ordinary activities after finance costs but before exceptional items. Includes
    ordinary operating result plus other income minus finance costs, before any exceptional gains or losses.
    Excludes exceptional items and tax. The printed subtotal for profit before exceptional items and tax
    maps here.
  aliases:
  - PROFIT BEFORE EXCEPTIONAL ITEM AND TAX
  - Profit before exceptional items and tax
  evidence: mapped
- fid: '239'
  name: Exchange Gain/(Loss)
  statement: income
  order: 50
  concept: Net foreign exchange gain or loss arising from remeasurement, translation, or settlement of
    monetary items outside the finance-cost presentation. Includes exchange differences on trade receivables/payables,
    loans, cash, and similar monetary exposures when reported as a standalone exchange gain/loss line.
    Excludes translation differences on foreign operations that go to OCI and excludes any FX element
    already included in finance costs. Never map a printed total/subtotal line here.
  aliases: []
  evidence: inferred
- fid: '249'
  name: Gain (Loss) on Sale of Assets
  statement: income
  order: 51
  concept: Gain or loss on disposal of non-current operating assets such as property, plant and equipment,
    equipment, software, intangibles, or other fixed assets. Includes realized gains/losses on asset sales
    and related disposal results. Excludes gains/losses on sale of investments, impairment, depreciation,
    and revaluation changes. Never map a printed total/subtotal line here.
  aliases: []
  evidence: inferred
- fid: '252'
  name: Gain (Loss) on Sale of Investments
  statement: income
  order: 52
  concept: Net gain or loss on disposal of investments. Includes realized results from sale of shares,
    securities, mutual funds, or other financial investments when the line is specifically about investments
    rather than fixed assets. Excludes gains/losses on sale of assets, unrealized fair value changes,
    dividend income, and interest income. Never map a printed total/subtotal line here.
  aliases: []
  evidence: inferred
- fid: '310'
  name: Restructuring Costs
  statement: income
  order: 53
  concept: Expense from restructuring activities, such as reorganization, closure, redundancy, severance,
    plant shutdown, contract termination, or other one-off restructuring charges. Includes only the restructuring
    component as reported. Excludes ordinary employee costs, impairment, and other exceptional items not
    specifically restructuring. Never map a printed total/subtotal line here.
  aliases:
  - Re-structuring expenses
  evidence: mapped
- fid: '301'
  name: Prior Year Income/(Expenditure)
  statement: income
  order: 54
  concept: Income or expense items relating to prior accounting years that are recognized in the current
    period. Includes prior-period adjustments, prior-year income, and prior-year expenditure write-backs/charges
    when shown as a separate line. Excludes current-period normal operating items and all exceptional
    items unless explicitly labeled as prior-year. Never map a printed total/subtotal line here.
  aliases: []
  evidence: inferred
- fid: '278'
  name: Other Exceptional Items
  statement: income
  order: 55
  concept: Non-routine exceptional gain or loss not classified into a more specific exceptional category.
    Includes one-off charges, credits, write-backs, settlements, regulatory impacts, and other material
    unusual items presented as exceptional. Excludes restructuring costs, prior-year items, gains/losses
    on sale of assets or investments, and extraordinary items. Negative amounts represent credits or gains
    where the filing uses that convention. Never map a printed total/subtotal line here.
  aliases:
  - 'Exceptional items: charge / (credit)'
  - 'Exceptional items: charge'
  evidence: mapped
- fid: '319'
  name: Total Exceptional Items
  statement: income
  order: 56
  concept: Total of all exceptional items included in the statement, comprising restructuring costs, prior-year
    items, gains or losses on sale of assets, gains or losses on sale of investments, other exceptional
    items, and any similar exceptional components separately disclosed. Positive amounts are charges/expenses;
    credits or gains are negative when the filing uses that sign convention. The printed exceptional-item
    total maps here.
  aliases: []
  evidence: inferred
- fid: '296'
  name: Profit/(Loss) From Ordinary Activities before Tax
  statement: income
  order: 57
  concept: Profit or loss before tax after adding or subtracting exceptional items from profit before
    exceptional items. Includes ordinary activities result plus total exceptional items, but excludes
    tax. The printed profit-before-tax line maps here.
  aliases:
  - PROFIT BEFORE TAX
  - Profit before tax
  - Profit before tax
  - Profit before tax
  - Profit before tax
  evidence: mapped
- fid: '318'
  name: Tax Expense
  statement: income
  order: 58
  concept: 'TOTAL income-tax expense for the period: map the printed ''Total tax expense'' line. If (and
    ONLY if) no total line is printed, sum the current-tax and deferred-tax lines instead. NEVER map the
    ''current tax'' or ''deferred tax'' component lines when a printed total exists, and NEVER sum components
    together with the printed total.'
  aliases:
  - Current tax
  - Current tax
  - Current tax
  - Current tax
  - Current tax
  evidence: mapped
- fid: '231'
  name: Deferred Tax
  statement: income
  order: 59
  concept: Deferred tax expense or benefit recognized in profit or loss for the period. Includes deferred
    tax charge, deferred tax credit, movements in deferred tax assets or liabilities, and deferred tax
    expense/(credit) when shown as a separate line. Excludes current tax and any income-tax effects reported
    in other comprehensive income or discontinued operations. Positive values usually represent expense;
    credits are negative. Never map a printed total/subtotal line here.
  aliases:
  - Deferred tax
  - Deferred tax
  - Deferred tax
  - Deferred tax
  - Deferred tax charge
  evidence: mapped
- fid: '270'
  name: Net Profit/(Loss) from Ordinary Activities after Tax
  statement: income
  order: 60
  concept: Net profit or loss from ordinary activities after tax, i.e. profit before tax minus current
    and deferred tax, before any extraordinary items or discontinued operations are included. Excludes
    extraordinary items and discontinued operations. This is an after-tax subtotal for continuing ordinary
    activities.
  aliases: []
  evidence: inferred
- fid: '244'
  name: Extraordinary Items
  statement: income
  order: 61
  concept: Extraordinary gains or losses arising from events clearly distinct from ordinary business operations
    and expected to be rare or abnormal. Includes extraordinary items only when the filing explicitly
    uses that category. Excludes exceptional items, restructuring, prior-year items, and discontinued
    operations unless specifically classified as extraordinary. Never map a printed total/subtotal line
    here.
  aliases: []
  evidence: inferred
- fid: '20017'
  name: Profit/(Loss) for the Period from Continuing Operations
  statement: income
  order: 62
  concept: Profit or loss from continuing operations after tax, combining ordinary activities after tax
    and any extraordinary items if separately presented within continuing operations. Excludes discontinued
    operations entirely. This is the continuing-operations after-tax subtotal.
  aliases: []
  evidence: inferred
- fid: '20016'
  name: Profit/(Loss) from Discontinuing Operations
  statement: income
  order: 63
  concept: Pre-tax profit or loss from discontinued operations, i.e. the operating result of a business
    component that has been disposed of, held for sale, or otherwise discontinued. Excludes tax on discontinued
    operations and excludes continuing operations. Never map a printed total/subtotal line here.
  aliases: []
  evidence: inferred
- fid: '20018'
  name: Tax Expense of Discontinuing Operations
  statement: income
  order: 64
  concept: Income tax expense or benefit attributable specifically to discontinued operations. Includes
    current and deferred tax on discontinued operations when presented separately. Excludes tax on continuing
    operations and tax effects in OCI. Positive values usually represent expense; negative values represent
    tax benefit.
  aliases: []
  evidence: inferred
- fid: '20015'
  name: Net Profit From Discontinuing Operations (After Tax)
  statement: income
  order: 65
  concept: Net profit or loss from discontinued operations after tax, calculated as discontinued-operations
    profit or loss minus tax on discontinued operations. Excludes continuing operations. The after-tax
    subtotal for discontinued operations maps here.
  aliases: []
  evidence: inferred
- fid: '269'
  name: Net Profit/(Loss) for the Period
  statement: income
  order: 66
  concept: Net profit or loss for the period attributable to the full statement of profit and loss, after
    continuing and discontinued operations and after tax. Includes all profit/loss components that flow
    through profit or loss for the period. Excludes OCI and equity movements outside profit or loss. The
    printed bottom-line profit for the period maps here.
  aliases:
  - PROFIT FOR THE PERIOD
  - Profit for the period / year
  - Profit for the period / year
  - Profit for the period
  - Profit for the period
  evidence: mapped
- fid: '16484'
  name: Other Comprehensive Income
  statement: income
  order: 67
  concept: Total other comprehensive income or loss for the period, being the sum of OCI items after tax
    across both non-reclassifiable and reclassifiable categories. Includes all OCI components after tax,
