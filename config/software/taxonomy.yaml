sector: software
name: Software
expected_unique_field_count: 410
expected_scope_assignment_count: 795
mapping_policy:
  ambiguity: reject
  sign: preserve_source
  unit_and_time_nature: strict
  total_component_boundary: exact
  model_authority: proposal_only
location_vocabulary:
- STATEMENT-WIDE
- NON-CURRENT
- CURRENT
- EQUITY
- OPERATING
- INVESTING
- FINANCING
- RECONCILIATION
- PROFIT-ATTRIBUTION
- CI-ATTRIBUTION
- TCI-ATTRIBUTION
- EXTERNAL-REVENUE
- INTER-SEGMENT
- SEGMENT-REVENUE
- SEGMENT-RESULTS
- SEGMENT-ASSETS
- SEGMENT-LIABILITIES
statement_sections:
  income:
  - pattern: total comprehensive income.*attributable
    section: TCI-ATTRIBUTION
    location: TCI-ATTRIBUTION
  - pattern: comprehensive income.*attributable
    section: CI-ATTRIBUTION
    location: CI-ATTRIBUTION
  - pattern: profit.*attributable
    section: PROFIT-ATTRIBUTION
    location: PROFIT-ATTRIBUTION
  balance:
  - pattern: non\s*-?\s*current\s+assets
    section: NON-CURRENT ASSETS
    location: NON-CURRENT
  - pattern: current\s+assets
    section: CURRENT ASSETS
    location: CURRENT
  - pattern: non\s*-?\s*current\s+liabilit
    section: NON-CURRENT LIABILITIES
    location: NON-CURRENT
  - pattern: current\s+liabilit
    section: CURRENT LIABILITIES
    location: CURRENT
  - pattern: ^(?:[a-z]\s+)?equity(?:\s+and\s+liabilities)?$|shareholders.?\s*funds
    section: EQUITY
    location: EQUITY
  cashflow:
  - pattern: operating\s+activities
    section: OPERATING
    location: OPERATING
  - pattern: investing\s+activities
    section: INVESTING
    location: INVESTING
  - pattern: financing\s+activities
    section: FINANCING
    location: FINANCING
  - pattern: cash\s+and\s+cash\s+equivalents
    section: RECONCILIATION
    location: RECONCILIATION
  segment:
  - pattern: inter.?segment\s+revenue
    section: INTER-SEGMENT
    location: INTER-SEGMENT
  - pattern: external\s+customers
    section: EXTERNAL-REVENUE
    location: EXTERNAL-REVENUE
  - pattern: ^segment\s+revenue
    section: SEGMENT-REVENUE
    location: SEGMENT-REVENUE
  - pattern: ^segment\s+result
    section: SEGMENT-RESULTS
    location: SEGMENT-RESULTS
  - pattern: ^segment\s+assets
    section: SEGMENT-ASSETS
    location: SEGMENT-ASSETS
  - pattern: ^segment\s+liabilit
    section: SEGMENT-LIABILITIES
    location: SEGMENT-LIABILITIES
implicit_initial_sections:
  balance:
    before_pattern: ^current assets$
    section: NON-CURRENT ASSETS
    location: NON-CURRENT
identities:
  balance:
  - name: Assets = Equity + Liabilities
    lhs:
    - fid: '13771'
      sign: 1
    rhs: '13776'
  - name: Non-current + Current assets = Total assets
    lhs:
    - fid: '13777'
      sign: 1
    - fid: '13774'
      sign: 1
    rhs: '13771'
  income:
  - name: PBT − tax = Net Profit
    lhs:
    - fid: '296'
      sign: 1
    - fid: '318'
      sign: -1
    - fid: '231'
      sign: -1
    alternate_lhs:
    - fid: '296'
      sign: 1
    - fid: '318'
      sign: -1
    rhs: '269'
  - name: Net Profit + OCI = Total Comprehensive Income
    lhs:
    - fid: '269'
      sign: 1
    - fid: '16484'
      sign: 1
    rhs: '20019'
  - name: Owners TCI attributable = Profit + OCI attributable
    lhs:
    - fid: '22299'
      sign: 1
    - fid: '22291'
      sign: 1
    rhs: '22303'
  - name: NCI TCI attributable = Profit + OCI attributable
    lhs:
    - fid: '22298'
      sign: 1
    - fid: '22290'
      sign: 1
    rhs: '22302'
  cashflow:
  - name: Operating + Investing + Financing = Net change before exchange effect
    lhs:
    - fid: '17538'
      sign: 1
    - fid: '17537'
      sign: 1
    - fid: '17536'
      sign: 1
    rhs: '30458'
  - name: Net change before exchange effect + exchange effect = Net change
    lhs:
    - fid: '30458'
      sign: 1
    optional_lhs:
    - fid: '17529'
      sign: 1
    rhs: '17541'
  - name: Opening + Net change + adjustments = Closing
    lhs:
    - fid: '17519'
      sign: 1
    - fid: '17541'
      sign: 1
    optional_lhs:
    - fid: '30513'
      sign: 1
    rhs: '30371'
