- fid: '8920'
  name: Segment Revenue
  value_type: amount
  unit: statement_currency
  time_nature: duration
  definition:
    meaning: 'Gross/leaf segment-revenue total — ONLY when the statement has a SINGLE revenue section: its bare ''Total''
      row (or the gross total printed before ''Less: Inter segment revenue'') maps here.'
    includes: []
    excludes: []
    mapping_notes:
    - If the filing prints multiple revenue sub-sections ([EXTERNAL-REVENUE], [INTER-SEGMENT], [SEGMENT-REVENUE]), leave their
      totals unmapped except the final segment-revenues total (8931).
    - Individual segment rows are NEVER mapped.
    distinguish_from:
    - '8931'
  mapping:
    match_name: false
    aliases: []
    locations:
    - SEGMENT-REVENUE
    rules:
    - id: single-section-gross-segment-revenue-total
      status: reviewed
      aliases:
      - Total
      locations:
      - segment-revenue
      occurrence: only
    mode: rules_only
    location_source: declared
  scopes:
    standalone:
      position: 1
      calculation:
        type: reported
    consolidated:
      position: 1
      calculation:
        type: reported
  evidence: client_mapping
- fid: '8925'
  name: Unallocated Income (Expenses)
  value_type: amount
  unit: statement_currency
  time_nature: duration
  definition:
    meaning: Income or expense items that are not attributable to any reportable segment and are presented as a residual/unallocated
      corporate amount in the segment note.
    includes:
    - unallocated corporate income or expenses that are not assigned to a segment.
    excludes:
    - Excludes segment-specific operating revenue, operating expenses, finance cost, tax, depreciation, assets, liabilities,
      and eliminations presented separately.
    mapping_notes:
    - Positive expenses and negative income follow the filing’s sign convention when stated as a net residual.
    distinguish_from:
    - '8918'
    - '8929'
    - '18570'
    - '18574'
    - '18580'
    - '18581'
  mapping:
    aliases:
    - Unallocated
    locations:
    - SEGMENT-REVENUE
    match_name: true
    mode: canonical_name_and_aliases
    location_source: declared
  scopes:
    standalone:
      position: 2
      calculation:
        type: reported
    consolidated:
      position: 2
      calculation:
        type: reported
  evidence: client_mapping
- fid: '8924'
